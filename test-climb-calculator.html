<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeToolz - Climb Calculator (Standalone Test)</title>
    <style>
        /* Inline the climb calculator for standalone testing */
        :root {
            --primary-color: #2563eb;
            --text-color: #1f2937;
            --bg-color: #ffffff;
            --card-bg: #f8fafc;
            --border-color: #e5e7eb;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            margin-bottom: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
        }
        .results {
            margin-top: 30px;
            padding: 20px;
            background: var(--primary-color);
            color: white;
            border-radius: 8px;
        }
        .result-item {
            padding: 10px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚴 BikeToolz - Climb Calculator</h1>
        <p>Standalone Test Version</p>
    </div>
    
    <div class="container">
        <h2>Quick Test</h2>
        <p>Enter your values to test the calculator:</p>
        
        <div class="input-group">
            <label>Power (watts):</label>
            <input type="number" id="power" value="250" min="50" max="1000">
        </div>
        
        <div class="input-group">
            <label>Rider Weight (kg):</label>
            <input type="number" id="riderWeight" value="70" min="30" max="150">
        </div>
        
        <div class="input-group">
            <label>Distance (km):</label>
            <input type="number" id="distance" value="10" min="0.1" max="100" step="0.1">
        </div>
        
        <div class="input-group">
            <label>Elevation Gain (m):</label>
            <input type="number" id="elevation" value="800" min="10" max="5000">
        </div>
        
        <div class="results" id="results">
            <h3>Results</h3>
            <div class="result-item">
                <strong>Average Grade:</strong> <span id="grade">-</span>
            </div>
            <div class="result-item">
                <strong>Climbing Speed:</strong> <span id="speed">-</span>
            </div>
            <div class="result-item">
                <strong>Climb Time:</strong> <span id="time">-</span>
            </div>
        </div>
    </div>
    
    <script>
        function calculate() {
            const power = parseFloat(document.getElementById('power').value);
            const weight = parseFloat(document.getElementById('riderWeight').value);
            const distance = parseFloat(document.getElementById('distance').value);
            const elevation = parseFloat(document.getElementById('elevation').value);
            
            const grade = (elevation / (distance * 1000)) * 100;
            const gradeRadians = Math.atan(grade / 100);
            const totalWeight = weight + 10; // bike weight estimate
            
            const availablePower = power * 0.95; // 5% drivetrain loss
            
            // Simple speed calculation
            let speed = 3.0;
            for (let i = 0; i < 50; i++) {
                const gravPower = totalWeight * 9.81 * Math.sin(gradeRadians) * speed;
                const rollPower = totalWeight * 9.81 * Math.cos(gradeRadians) * 0.005 * speed;
                const aeroPower = 0.5 * 1.2 * 0.3 * Math.pow(speed, 3);
                const totalRequired = gravPower + rollPower + aeroPower;
                
                if (Math.abs(availablePower - totalRequired) < 0.1) break;
                speed += (availablePower > totalRequired) ? 0.1 : -0.1;
                speed = Math.max(1, Math.min(speed, 20));
            }
            
            const timeSeconds = (distance * 1000) / speed;
            const hours = Math.floor(timeSeconds / 3600);
            const minutes = Math.floor((timeSeconds % 3600) / 60);
            
            document.getElementById('grade').textContent = grade.toFixed(1) + '%';
            document.getElementById('speed').textContent = (speed * 3.6).toFixed(1) + ' km/h';
            document.getElementById('time').textContent = hours + 'h ' + minutes + 'm';
        }
        
        // Auto-calculate on input
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', calculate);
        });
        
        // Initial calculation
        calculate();
    </script>
</body>
</html>
